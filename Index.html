<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OG's Fashion House</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:#000;
color:white;
font-family:Inter;
}

header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 8%;
background:#000;
border-bottom:1px solid #111;
z-index:10;
}

.logo{
font-family:"Playfair Display";
font-size:26px;
color:#ff2e8f;
letter-spacing:1px;
}

nav a{
margin-left:28px;
text-decoration:none;
color:#ccc;
font-size:14px;
transition:.3s;
}

nav a:hover{
color:#ff2e8f;
}

.hero{
height:95vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
background:radial-gradient(circle at top,#111,#000);
}

.hero h1{
font-family:"Playfair Display";
font-size:95px;
line-height:1.1;
background:linear-gradient(90deg,#ff2e8f,#ff79b0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:25px;
color:#aaa;
font-size:18px;
}

.hero button{
margin-top:35px;
padding:14px 42px;
border:none;
background:#ff2e8f;
color:white;
cursor:pointer;
font-size:14px;
letter-spacing:1px;
}

.section{
padding:120px 10%;
}

.section-title{
font-family:"Playfair Display";
font-size:46px;
margin-bottom:30px;
color:#ff2e8f;
}

.section p{
max-width:650px;
color:#bbb;
line-height:1.7;
}

.lookbook{
margin-top:70px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:28px;
}

.card{
position:relative;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:420px;
object-fit:cover;
transition:.6s;
}

.card:hover img{
transform:scale(1.1);
filter:brightness(.7);
}

.card-title{
position:absolute;
bottom:25px;
left:25px;
font-size:16px;
letter-spacing:1px;
background:#000a;
padding:10px 20px;
}

.story{
display:grid;
grid-template-columns:1fr 1fr;
gap:80px;
align-items:center;
}

.story img{
width:100%;
height:500px;
object-fit:cover;
}

.story h2{
font-family:"Playfair Display";
font-size:40px;
color:#ff2e8f;
margin-bottom:20px;
}

.story p{
color:#bbb;
line-height:1.8;
}

.quote{
text-align:center;
padding:140px 20%;
font-family:"Playfair Display";
font-size:40px;
color:#ff79b0;
line-height:1.4;
}

footer{
margin-top:100px;
padding:60px;
text-align:center;
border-top:1px solid #111;
color:#777;
}

@media(max-width:900px){

.hero h1{
font-size:52px;
}

.story{
grid-template-columns:1fr;
}

.quote{
font-size:28px;
padding:100px 10%;
}

}

</style>

</head>

<body>

<header>

<div class="logo">OG's Fashion House</div>


<nav>
<a href="#home">Home</a>
<a href="about.html">About</a>

</nav>

</header>

<section class="hero" id="home">

<div>
<img src="og.png" alt="" class="logo">
<h1>Fashion<br>Editorial</h1>

<p>Where confidence meets luxury design.</p>
